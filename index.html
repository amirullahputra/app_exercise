<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Exercise Dashboard — VHM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=5">
  <style>
    /* ── LAYER TOGGLE ── */
    .layer-row{display:flex;gap:6px;margin-bottom:1rem;background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:.5rem;box-shadow:var(--shadow-sm)}
    .layer-btn{flex:1;padding:9px 16px;border-radius:var(--r);border:1.5px solid transparent;background:transparent;color:var(--t2);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;transition:all .15s;text-align:center}
    .layer-btn:hover:not(.act){background:var(--bg2);color:var(--t1)}
    .layer-btn.library.act{background:var(--acc-bg);border-color:var(--acc);color:var(--acc)}
    .layer-btn.gym.act{background:var(--f1-bg);border-color:var(--f1);color:var(--f1)}
    .layer-btn.cardio.act{background:var(--f3-bg);border-color:var(--f3);color:var(--f3)}
    /* ── QUARTER SELECTOR ── */
    .qsel-row{display:flex;gap:5px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:.625rem 1rem;box-shadow:var(--shadow-sm)}
    .qsel-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-right:4px;flex-shrink:0}
    .qsel-btn{padding:4px 12px;border-radius:20px;border:1.5px solid var(--bdr2);background:var(--bg2);color:var(--t2);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;transition:all .15s;white-space:nowrap}
    .qsel-btn:hover{border-color:var(--acc);color:var(--acc)}
    .qsel-btn.act{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 2px 6px rgba(67,97,238,.25)}
    /* ── FORM ELEMENTS ── */
    .form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:.75rem}
    .form-group{display:flex;flex-direction:column;gap:4px}
    .form-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
    .form-inp{background:var(--bg2);border:1.5px solid var(--bdr2);border-radius:var(--r);color:var(--t0);padding:7px 10px;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;transition:.15s}
    .form-inp:focus{border-color:var(--acc)}
    .form-sel{background:var(--bg2);border:1.5px solid var(--bdr2);border-radius:var(--r);color:var(--t0);padding:7px 10px;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;cursor:pointer}
    .form-sel:focus{border-color:var(--acc)}
    .btn{padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;transition:all .15s}
    .btn-primary{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(67,97,238,.3)}
    .btn-primary:hover{background:#3451d1}
    .btn-gym{background:var(--f1);color:#fff;box-shadow:0 2px 8px rgba(255,107,53,.3)}
    .btn-gym:hover{opacity:.85}
    .btn-cardio{background:var(--f3);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.3)}
    .btn-cardio:hover{opacity:.85}
    .btn-ghost{background:var(--bg2);border:1.5px solid var(--bdr2);color:var(--t1)}
    .btn-ghost:hover{border-color:var(--acc);color:var(--acc)}
    .btn-danger{background:var(--warn-bg);border:1px solid var(--warn-bdr);color:var(--warn)}
    /* ── ZONE BADGES ── */
    .bdg-z1{background:var(--f3-bg);color:var(--f3);border:1px solid var(--f3-bdr)}
    .bdg-z2{background:var(--acc-bg);color:var(--acc);border:1px solid var(--acc-bdr)}
    .bdg-z3{background:var(--f2-bg);color:var(--f2);border:1px solid var(--f2-bdr)}
    .bdg-z4{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bdr)}
    /* ── MARKDOWN CONTENT ── */
    .md-content{font-size:13px;line-height:1.75;color:var(--t1)}
    .md-content h1{font-size:16px;font-weight:800;color:var(--t0);margin:16px 0 8px}
    .md-content h2{font-size:14px;font-weight:800;color:var(--acc);margin:14px 0 6px}
    .md-content h3{font-size:13px;font-weight:700;color:var(--t0);margin:12px 0 5px}
    .md-content strong{color:var(--t0);font-weight:700}
    .md-content code{background:var(--bg3);padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--f2)}
    .md-content hr{border:none;border-top:1px solid var(--bdr);margin:12px 0}
    .md-content ul,.md-content ol{padding-left:20px;margin:6px 0}
    .md-content li{margin:3px 0}
    .md-content p{margin:6px 0}
    /* ── RPE COLORS ── */
    .rpe-ok{color:var(--f3);font-weight:700}
    .rpe-mid{color:var(--f2);font-weight:700}
    .rpe-hi{color:var(--warn);font-weight:700}
    /* ── EMPTY ── */
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--t3)}
    .empty-ico{font-size:2.5rem;margin-bottom:.5rem}
    .empty-txt{font-size:13px}
    /* ── MOBILE ── */
    @media(max-width:480px){
      .form-row{flex-direction:column;align-items:stretch}
      .form-group{width:100%}
      .form-inp,.form-sel{width:100%!important}
      .qsel-row{padding:.5rem .75rem}
      .layer-btn{padding:8px 10px;font-size:11px}
    }
  </style>
</head>
<body>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>
    <div class="modal-title">Login</div>
    <div class="modal-sub">Masuk untuk menyimpan log exercise</div>
    <input class="modal-input" id="auth-user" type="email" placeholder="Email" autocomplete="email">
    <input class="modal-input" id="auth-pass" type="password" placeholder="Password" autocomplete="current-password">
    <div class="modal-err" id="auth-err"></div>
    <div class="modal-row">
      <button class="modal-btn secondary" onclick="closeAuthModal()">Batal</button>
      <button class="modal-btn primary" onclick="doLogin()">Login</button>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-ico">💪</div>
    <div>
      <div class="topbar-title">Exercise Dashboard</div>
      <div class="topbar-sub">Library · Gym · Cardio · VHM 2026–2029</div>
    </div>
  </div>
  <div class="auth-wrap">
    <span class="auth-user" id="auth-user-label"></span>
    <button class="auth-btn" id="auth-action-btn" onclick="onAuthBtnClick()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="app">
  <div id="qsel-row" class="qsel-row"></div>
  <div class="tab-nav" id="tab-nav"></div>
  <div id="panels-root"></div>
</div>

<div id="app-version" style="position:fixed;bottom:4px;right:8px;font-size:9px;color:#999;opacity:.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">v=5</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module" src="js/main.js?v=5"></script>
</body>
</html>
